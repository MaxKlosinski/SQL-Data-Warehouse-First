sources:
  - name: crm_sources
    description: A data source for the CRM system.
    database: dbt_bara_project
    schema: landing

    tables:
      - name: cust_info
        description: The table contains customer information for CRM purposes. It includes details such as customer IDs, names, marital status, gender, and the date of account creation. This data can be used to analyze customer demographics, identify trends within customer groups, and support targeted marketing efforts.
        identifier: lnd_crm_cust_info
        config:
          loaded_at_field: cst_create_date
          freshness:
            warn_after:
              count: 48
              period: hour

        columns:
          - name: cst_id
            data_tests:
              - not_null
              - unique

          - name: cst_marital_status
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['S', 'M', 'F']
          - name: cst_gndr
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['S', 'M', 'F']

      - name: prd_info
        description: The table contains product information used in CRM processes. It includes details such as product IDs, names, costs, and relevant date ranges. This data can be used to track product offerings, analyze pricing strategies, and manage inventory timelines.\
        identifier: lnd_crm_prd_info
        data_tests:
          # Date Logic Validity Check
          # Description: Ensures that the Product Start Date does not occur after 
          # the Product End Date.
          # Expectation: No results returned.
          - dbt_utils.expression_is_true:
              arguments:
                expression: "prd_end_dt > prd_start_dt or prd_end_dt is null"
        columns:
          - name: prd_id
            data_tests:
              - not_null
              - unique

          - name: prd_cost
            data_tests:
              - not_null

          - name: prd_line
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['R', 'S', 'M', 'T']

          - name: prd_key
            data_tests:
              - dbt_expectations.expect_column_values_to_not_match_regex:
                  arguments:
                    regex: "\\s"
            
      - name: sales_details
        description: This table contains detailed sales information related to customer orders. It includes data such as order number, product key, customer ID, order dates, shipping dates, due dates, sales amounts, quantities, and prices. Users can utilize this data for analyzing sales trends, evaluating product performance, and improving customer relationship management.
        identifier: lnd_crm_sales_details
        data_tests:
          # We're checking to see if the the total sales value (sls_sales) 
          # always equals the unit price (sls_price) multiplied by the 
          # quantity (sls_quantity). The math adds up in the visible rows 
          # (e.g., 1 * 3578 = 3578), but you need to verify this for the entire table.
          - dbt_utils.expression_is_true:
              arguments:
                expression: "sls_price + sls_quantity = sls_sales"
          # We ensure that the columns sls_sales, sls_quantity, and sls_price are 
          # always greater than zero (no negative or zero values for completed orders).
          - dbt_utils.expression_is_true:
              arguments:
                expression: "sls_price > 0 and sls_quantity > 0 and sls_sales > 0"
          
        columns:
          - name: sls_ord_num
            data_tests:
                - not_null
                - unique

          - name: sls_prd_key
            data_tests:
                - not_null
                - unique
          
          - name: sls_cust_id
            data_tests:
                - not_null
                - unique
                - relationships:
                    arguments:
                      to: source('crm_sources', 'cust_info')
                      field: cst_id
      
  - name: erp_sources
    description: A data source for the ERP system.
    database: dbt_bara_project
    schema: landing
    
    tables:
      - name: cust_az12
        description: The table contains customer records from the ERP system, including details such as customer ID, birthdate, and gender. It also includes a field for error records, which can help in identifying incomplete or erroneous data. Use cases include analyzing customer demographics and ensuring data quality in customer records.
        identifier: lnd_erp_cust_az12
        
        columns:
          - name: CID
            data_tests:
                - not_null
                - unique
          
          - name: GEN
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['Male', 'Female']
      
      - name: loc_a101
        description: The table contains information related to ERP data localization, focusing on country-specific identifiers. Potential use cases include analyzing regional data distribution and identifying discrepancies in records. It also includes a column for error records, which can help in troubleshooting and data validation.
        identifier: lnd_erp_loc_a101
        
        columns:
          - name: CID
            data_tests:
                - not_null
                - unique
      
      - name: px_cat_g1v2
        description: This table contains product category information from the ERP system. It includes details about main categories and subcategories, along with a field for maintenance notes. Potential use cases include analyzing product categorization, tracking changes in product lines, and identifying any errors in the category data.
        identifier: lnd_erp_px_cat_g1v2
        
        columns:
          - name: ID
            data_tests:
                - not_null
                - unique
          
          - name: MAINTENANCE
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['Yes', 'No']