models:
  - name: bronze_clean_crm_cust_info
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: [ 'cst_id', 'cst_key' ]
      alias: silver_crm_cust_info
      on_schema_change: append_new_columns

    columns:
      - name: cst_id
        data_type: int
        description: "A unique technical identifier for the customer."
        constraints:
          - type: not_null

      - name: cst_key
        data_type: string
        description: "A business key for the customer (e.g., AW00011000)."
        constraints:
          - type: not_null

      - name: cst_firstname
        data_type: string
        description: "The first name of the customer."

      - name: cst_lastname
        data_type: string
        description: "The last name of the customer."

      - name: cst_marital_status
        data_type: string
        description: "The marital status of the customer (e.g., M - Married, S - Single)."

      - name: cst_gndr
        data_type: string
        description: "The gender of the customer."

      - name: cst_create_date
        data_type: date
        description: "The date when the record was created in the source system."
    description: The bronze_clean_crm_cust_info model processes customer information from the bronze CRM layer. It removes duplicate records based on customer ID (cst_id) and ensures only the most recent record is retained using the creation date (cst_create_date). Additionally, it cleans and standardizes customer attributes such as first name, last name, marital status, and gender. Marital status and gender are transformed into human-readable formats, and null values are handled appropriately.

  - name: bronze_clean_crm_prd_info
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: [ 'prd_id', 'prd_end_dt', 'prd_start_dt' ]
      alias: silver_crm_prd_info
      on_schema_change: append_new_columns
    constraints:
      - type: check
        expression: "prd_start_dt <= prd_end_dt OR prd_end_dt IS NULL"
        columns: [ 'prd_start_dt', 'prd_end_dt' ]

    columns:
      - name: prd_id
        data_type: int
        description: "A unique technical identifier for the product."

      - name: cat_id
        data_type: string
        description: "A category identifier derived from the product key."

      - name: prd_key
        data_type: string
        description: "A business key for the product (e.g., BK-PRD-00001)."

      - name: prd_nm
        data_type: string
        description: "The name of the product."

      - name: prd_cost
        data_type: int
        description: "The cost of the product. Null values are treated as 0."
        constraints:
          - type: not_null

      - name: prd_line
        data_type: string
        description: "The product line (e.g., Mountain, Road, Touring)."

      - name: prd_start_dt
        data_type: date
        description: "The start date of the product's validity period."

      - name: prd_end_dt
        data_type: timestamp
        description: "The end date of the product's validity period, calculated as the day before the next record's start date for the same product key."
    description: The bronze_clean_crm_prd_info model processes raw product information from the CRM system, transforming and cleaning the data for further analysis. It includes operations such as extracting and formatting category IDs and product keys, handling null values in product costs, categorizing product lines, and calculating product end dates based on start dates. This model serves as a foundational layer for downstream analytics and reporting.

  - name: bronze_clean_crm_sales_details
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: [ 'sls_ord_num' ]
      alias: silver_crm_sales_details
      on_schema_change: append_new_columns

    constraints:
      - type: check
        name: check_valid_ship_date
        columns: [ sls_ship_dt ]
        expression: >
          sls_ship_dt > 0  AND length(cast(sls_ship_dt as string)) = 8  AND cast(sls_ship_dt AS int) BETWEEN 19000101 AND 20500101

      - type: check
        name: check_sales_math_and_positive
        columns: [ sls_sales, sls_quantity, sls_price ]
        expression: >
          sls_sales = (sls_quantity * sls_price)  AND sls_sales > 0  AND sls_quantity > 0  AND sls_price > 0

    columns:
      - name: sls_ord_num
        data_type: string
        description: "The sales order number from the source system."

      - name: sls_prd_key
        data_type: string
        description: "The product key associated with the sales order."

      - name: sls_cust_id
        data_type: int
        description: "The customer ID associated with the sales order."

      - name: sls_order_dt
        data_type: string
        description: "The date when the order was placed."

      - name: sls_ship_dt
        data_type: string
        description: "The date when the order was shipped."

      - name: sls_due_dt
        data_type: string
        description: "The date when the order is due."

      - name: sls_sales
        data_type: int
        description: "The total sales amount for the order."
        constraints:
          - type: not_null

      - name: sls_quantity
        data_type: int
        description: "The quantity of products sold in the order."
        constraints:
          - type: not_null

      - name: sls_price
        data_type: double
        description: "The price per unit for the products sold in the order."
        constraints:
          - type: not_null
    description: The bronze_clean_crm_sales_details model processes raw sales data from the CRM system, ensuring data quality and consistency. It performs deduplication, validates and formats date fields, and calculates accurate sales and price values based on quantity and price. This model serves as a cleaned and standardized version of the raw sales data for downstream analysis.
